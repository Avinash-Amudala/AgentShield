<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentShield Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            shield: {
              50:  '#ecfeff',
              100: '#cffafe',
              200: '#a5f3fc',
              300: '#67e8f9',
              400: '#22d3ee',
              500: '#06b6d4',
              600: '#0891b2',
              700: '#0e7490',
              800: '#155e75',
              900: '#164e63',
            }
          }
        }
      }
    };
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; }
    code, .mono { font-family: 'JetBrains Mono', monospace; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.3s ease-out; }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .pulse-dot { animation: pulse-dot 2s ease-in-out infinite; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .slide-in { animation: slideIn 0.25s ease-out; }

    .glass {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(71, 85, 105, 0.3);
    }
  </style>
</head>
<body class="dark min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    /* ------------------------------------------------------------------ */
    /*  Shield Icon SVG                                                    */
    /* ------------------------------------------------------------------ */
    function ShieldIcon({ className = "w-8 h-8" }) {
      return (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
          <path d="M9 12l2 2 4-4" className="text-emerald-400" stroke="currentColor" />
        </svg>
      );
    }

    /* ------------------------------------------------------------------ */
    /*  Action Badge                                                       */
    /* ------------------------------------------------------------------ */
    function ActionBadge({ action }) {
      const config = {
        allow:    { bg: "bg-emerald-500/15", text: "text-emerald-400", border: "border-emerald-500/30", dot: "bg-emerald-400" },
        deny:     { bg: "bg-red-500/15",     text: "text-red-400",     border: "border-red-500/30",     dot: "bg-red-400" },
        escalate: { bg: "bg-amber-500/15",   text: "text-amber-400",   border: "border-amber-500/30",   dot: "bg-amber-400" },
        approved: { bg: "bg-blue-500/15",    text: "text-blue-400",    border: "border-blue-500/30",    dot: "bg-blue-400" },
        denied:   { bg: "bg-rose-500/15",    text: "text-rose-400",    border: "border-rose-500/30",    dot: "bg-rose-400" },
      };
      const c = config[action] || config.allow;
      return (
        <span className={`inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full text-xs font-medium border ${c.bg} ${c.text} ${c.border}`}>
          <span className={`w-1.5 h-1.5 rounded-full ${c.dot}`}></span>
          {action.toUpperCase()}
        </span>
      );
    }

    /* ------------------------------------------------------------------ */
    /*  Stat Card                                                          */
    /* ------------------------------------------------------------------ */
    function StatCard({ label, value, pct, color, icon }) {
      const colors = {
        cyan:   "from-cyan-500/20 to-cyan-500/5    border-cyan-500/30   text-cyan-400",
        green:  "from-emerald-500/20 to-emerald-500/5 border-emerald-500/30 text-emerald-400",
        red:    "from-red-500/20 to-red-500/5      border-red-500/30    text-red-400",
        amber:  "from-amber-500/20 to-amber-500/5  border-amber-500/30  text-amber-400",
      };
      const c = colors[color] || colors.cyan;
      return (
        <div className={`relative overflow-hidden rounded-xl border bg-gradient-to-br p-5 ${c} fade-in`}>
          <div className="flex items-center justify-between mb-3">
            <span className="text-xs font-medium text-slate-400 uppercase tracking-wider">{label}</span>
            <span className="text-lg opacity-60">{icon}</span>
          </div>
          <div className="text-3xl font-bold tracking-tight">{value.toLocaleString()}</div>
          {pct !== undefined && (
            <div className="mt-1 text-xs text-slate-400">{pct}% of total</div>
          )}
        </div>
      );
    }

    /* ------------------------------------------------------------------ */
    /*  Mini Timeline Chart (pure CSS/SVG)                                 */
    /* ------------------------------------------------------------------ */
    function TimelineChart({ data }) {
      if (!data || data.length === 0) {
        return (
          <div className="glass rounded-xl p-6">
            <h3 className="text-sm font-semibold text-slate-300 uppercase tracking-wider mb-4">Event Timeline</h3>
            <div className="flex items-center justify-center h-32 text-slate-500 text-sm">No timeline data yet</div>
          </div>
        );
      }

      const maxVal = Math.max(...data.map(d => d[1]), 1);
      const barWidth = Math.max(4, Math.floor(600 / data.length) - 2);

      return (
        <div className="glass rounded-xl p-6">
          <h3 className="text-sm font-semibold text-slate-300 uppercase tracking-wider mb-4">Event Timeline</h3>
          <div className="flex items-end gap-1 h-32 overflow-x-auto pb-2">
            {data.slice(-48).map(([bucket, count], i) => {
              const height = Math.max(4, (count / maxVal) * 112);
              return (
                <div key={i} className="flex flex-col items-center gap-1 group relative" style={{ minWidth: barWidth }}>
                  <div className="absolute -top-6 opacity-0 group-hover:opacity-100 transition-opacity bg-slate-800 text-xs px-2 py-1 rounded text-cyan-300 whitespace-nowrap mono pointer-events-none z-10">
                    {count} events
                  </div>
                  <div
                    className="w-full rounded-sm bg-gradient-to-t from-cyan-600 to-cyan-400 opacity-80 hover:opacity-100 transition-all cursor-default"
                    style={{ height: `${height}px`, minWidth: barWidth }}
                  />
                </div>
              );
            })}
          </div>
          <div className="flex justify-between mt-2 text-[10px] text-slate-500 mono">
            <span>{data[0]?.[0]?.slice(5) || ""}</span>
            <span>{data[data.length - 1]?.[0]?.slice(5) || ""}</span>
          </div>
        </div>
      );
    }

    /* ------------------------------------------------------------------ */
    /*  Live Event Feed                                                    */
    /* ------------------------------------------------------------------ */
    function EventFeed({ events, filter }) {
      const listRef = useRef(null);
      const [autoScroll, setAutoScroll] = useState(true);

      useEffect(() => {
        if (autoScroll && listRef.current) {
          listRef.current.scrollTop = 0;
        }
      }, [events.length, autoScroll]);

      const filtered = useMemo(() => {
        let result = [...events].reverse();
        if (filter.action) result = result.filter(e => e.action === filter.action);
        if (filter.rule)   result = result.filter(e => (e.rule_name || "").toLowerCase().includes(filter.rule.toLowerCase()));
        if (filter.tool)   result = result.filter(e => (e.tool_name || "").toLowerCase().includes(filter.tool.toLowerCase()));
        if (filter.search) {
          const s = filter.search.toLowerCase();
          result = result.filter(e =>
            (e.tool_name || "").toLowerCase().includes(s) ||
            (e.rule_name || "").toLowerCase().includes(s) ||
            (e.reason || "").toLowerCase().includes(s) ||
            (e.agent_id || "").toLowerCase().includes(s)
          );
        }
        return result;
      }, [events, filter]);

      return (
        <div className="glass rounded-xl overflow-hidden">
          <div className="flex items-center justify-between px-5 py-3 border-b border-slate-700/50">
            <div className="flex items-center gap-2">
              <span className="w-2 h-2 rounded-full bg-emerald-400 pulse-dot"></span>
              <h3 className="text-sm font-semibold text-slate-300 uppercase tracking-wider">Live Event Feed</h3>
            </div>
            <span className="text-xs text-slate-500 mono">{filtered.length} events</span>
          </div>
          <div ref={listRef} className="overflow-y-auto" style={{ maxHeight: "480px" }}>
            {filtered.length === 0 ? (
              <div className="flex items-center justify-center py-16 text-slate-500 text-sm">
                {events.length === 0 ? "Waiting for events..." : "No events match filters"}
              </div>
            ) : (
              <table className="w-full text-sm">
                <thead>
                  <tr className="text-xs text-slate-500 uppercase border-b border-slate-700/30">
                    <th className="text-left px-5 py-2 font-medium">Time</th>
                    <th className="text-left px-3 py-2 font-medium">Tool</th>
                    <th className="text-left px-3 py-2 font-medium">Rule</th>
                    <th className="text-left px-3 py-2 font-medium">Action</th>
                    <th className="text-left px-3 py-2 font-medium">Agent</th>
                    <th className="text-left px-3 py-2 font-medium hidden xl:table-cell">Reason</th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.slice(0, 200).map((evt, i) => (
                    <tr key={evt.id || i} className="border-b border-slate-800/50 hover:bg-slate-800/40 transition-colors slide-in">
                      <td className="px-5 py-2.5 mono text-xs text-slate-400 whitespace-nowrap">
                        {(evt.timestamp || "").slice(11, 19)}
                      </td>
                      <td className="px-3 py-2.5">
                        <span className="inline-block px-2 py-0.5 rounded bg-slate-700/60 text-cyan-300 text-xs mono">
                          {evt.tool_name || "—"}
                        </span>
                      </td>
                      <td className="px-3 py-2.5 text-xs text-slate-300">{evt.rule_name || "—"}</td>
                      <td className="px-3 py-2.5"><ActionBadge action={evt.action || "allow"} /></td>
                      <td className="px-3 py-2.5 text-xs text-slate-400 mono">{evt.agent_id || "—"}</td>
                      <td className="px-3 py-2.5 text-xs text-slate-500 max-w-xs truncate hidden xl:table-cell" title={evt.reason || ""}>
                        {evt.reason || "—"}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        </div>
      );
    }

    /* ------------------------------------------------------------------ */
    /*  Rules Table                                                        */
    /* ------------------------------------------------------------------ */
    function RulesTable({ rules }) {
      if (!rules || rules.length === 0) {
        return (
          <div className="glass rounded-xl p-6">
            <h3 className="text-sm font-semibold text-slate-300 uppercase tracking-wider mb-4">Active Rules</h3>
            <div className="text-slate-500 text-sm text-center py-8">Loading rules...</div>
          </div>
        );
      }

      return (
        <div className="glass rounded-xl overflow-hidden">
          <div className="px-5 py-3 border-b border-slate-700/50">
            <h3 className="text-sm font-semibold text-slate-300 uppercase tracking-wider">Active Rules ({rules.length})</h3>
          </div>
          <div className="overflow-y-auto" style={{ maxHeight: "400px" }}>
            <table className="w-full text-sm">
              <thead>
                <tr className="text-xs text-slate-500 uppercase border-b border-slate-700/30">
                  <th className="text-left px-5 py-2 font-medium">Rule</th>
                  <th className="text-left px-3 py-2 font-medium">Priority</th>
                  <th className="text-left px-3 py-2 font-medium">OWASP</th>
                  <th className="text-left px-3 py-2 font-medium">Status</th>
                </tr>
              </thead>
              <tbody>
                {rules.map((rule, i) => (
                  <tr key={i} className="border-b border-slate-800/50 hover:bg-slate-800/40 transition-colors">
                    <td className="px-5 py-2.5">
                      <div className="font-medium text-slate-200">{rule.name}</div>
                      <div className="text-xs text-slate-500 mt-0.5 max-w-sm truncate">{rule.description}</div>
                    </td>
                    <td className="px-3 py-2.5">
                      <span className="mono text-xs text-slate-400">{rule.priority}</span>
                    </td>
                    <td className="px-3 py-2.5">
                      {rule.owasp_id ? (
                        <span className="inline-block px-2 py-0.5 rounded bg-violet-500/15 text-violet-400 text-xs border border-violet-500/30">
                          {rule.owasp_id}
                        </span>
                      ) : (
                        <span className="text-slate-600 text-xs">—</span>
                      )}
                    </td>
                    <td className="px-3 py-2.5">
                      <span className={`inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-xs font-medium ${
                        rule.enabled
                          ? "bg-emerald-500/15 text-emerald-400 border border-emerald-500/30"
                          : "bg-slate-500/15 text-slate-400 border border-slate-500/30"
                      }`}>
                        <span className={`w-1.5 h-1.5 rounded-full ${rule.enabled ? "bg-emerald-400" : "bg-slate-500"}`}></span>
                        {rule.enabled ? "Active" : "Disabled"}
                      </span>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    /* ------------------------------------------------------------------ */
    /*  Filter Bar                                                         */
    /* ------------------------------------------------------------------ */
    function FilterBar({ filter, setFilter }) {
      return (
        <div className="glass rounded-xl p-4 flex flex-wrap items-center gap-3">
          <div className="flex items-center gap-2 flex-1 min-w-[200px]">
            <svg className="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="8" /><path d="M21 21l-4.35-4.35" />
            </svg>
            <input
              type="text"
              placeholder="Search events..."
              value={filter.search || ""}
              onChange={e => setFilter(f => ({ ...f, search: e.target.value }))}
              className="bg-transparent text-sm text-slate-200 placeholder-slate-500 outline-none flex-1"
            />
          </div>
          <select
            value={filter.action || ""}
            onChange={e => setFilter(f => ({ ...f, action: e.target.value }))}
            className="bg-slate-800 text-sm text-slate-300 border border-slate-700 rounded-lg px-3 py-1.5 outline-none focus:border-cyan-500/50"
          >
            <option value="">All Actions</option>
            <option value="allow">Allow</option>
            <option value="deny">Deny</option>
            <option value="escalate">Escalate</option>
          </select>
          <input
            type="text"
            placeholder="Filter rule..."
            value={filter.rule || ""}
            onChange={e => setFilter(f => ({ ...f, rule: e.target.value }))}
            className="bg-slate-800 text-sm text-slate-300 border border-slate-700 rounded-lg px-3 py-1.5 outline-none w-36 placeholder-slate-500 focus:border-cyan-500/50"
          />
          <input
            type="text"
            placeholder="Filter tool..."
            value={filter.tool || ""}
            onChange={e => setFilter(f => ({ ...f, tool: e.target.value }))}
            className="bg-slate-800 text-sm text-slate-300 border border-slate-700 rounded-lg px-3 py-1.5 outline-none w-36 placeholder-slate-500 focus:border-cyan-500/50"
          />
          {(filter.search || filter.action || filter.rule || filter.tool) && (
            <button
              onClick={() => setFilter({ search: "", action: "", rule: "", tool: "" })}
              className="text-xs text-slate-400 hover:text-cyan-400 transition-colors"
            >
              Clear
            </button>
          )}
        </div>
      );
    }

    /* ------------------------------------------------------------------ */
    /*  Top Rules Mini Chart                                               */
    /* ------------------------------------------------------------------ */
    function TopRulesChart({ topRules }) {
      if (!topRules || topRules.length === 0) return null;
      const maxCount = topRules[0]?.[1] || 1;

      return (
        <div className="glass rounded-xl p-6">
          <h3 className="text-sm font-semibold text-slate-300 uppercase tracking-wider mb-4">Top Triggered Rules</h3>
          <div className="space-y-2.5">
            {topRules.slice(0, 8).map(([name, count], i) => (
              <div key={i} className="flex items-center gap-3">
                <div className="w-32 text-xs text-slate-400 truncate mono" title={name}>{name}</div>
                <div className="flex-1 h-2 bg-slate-800 rounded-full overflow-hidden">
                  <div
                    className="h-full rounded-full bg-gradient-to-r from-cyan-500 to-blue-500"
                    style={{ width: `${Math.max(4, (count / maxCount) * 100)}%` }}
                  />
                </div>
                <span className="text-xs text-slate-400 mono w-8 text-right">{count}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ------------------------------------------------------------------ */
    /*  App Root                                                           */
    /* ------------------------------------------------------------------ */
    function App() {
      const [events, setEvents]   = useState([]);
      const [stats, setStats]     = useState(null);
      const [rules, setRules]     = useState([]);
      const [filter, setFilter]   = useState({ search: "", action: "", rule: "", tool: "" });
      const [connected, setConnected] = useState(false);
      const [tab, setTab] = useState("feed");

      // Fetch initial data
      useEffect(() => {
        fetch("/api/stats").then(r => r.json()).then(setStats).catch(() => {});
        fetch("/api/rules").then(r => r.json()).then(d => setRules(d.rules || [])).catch(() => {});
        fetch("/api/audit?limit=500").then(r => r.json()).then(d => {
          setEvents((d.events || []).reverse());
        }).catch(() => {});
      }, []);

      // SSE connection
      useEffect(() => {
        let es;
        let retryTimer;

        function connect() {
          es = new EventSource("/api/events/stream");
          es.onopen = () => setConnected(true);
          es.onmessage = (msg) => {
            try {
              const evt = JSON.parse(msg.data);
              setEvents(prev => [...prev, evt]);
            } catch {}
          };
          es.onerror = () => {
            setConnected(false);
            es.close();
            retryTimer = setTimeout(connect, 3000);
          };
        }

        connect();
        return () => { es?.close(); clearTimeout(retryTimer); };
      }, []);

      // Refresh stats periodically
      useEffect(() => {
        const interval = setInterval(() => {
          fetch("/api/stats").then(r => r.json()).then(setStats).catch(() => {});
        }, 5000);
        return () => clearInterval(interval);
      }, []);

      const s = stats || { total: 0, allowed: 0, denied: 0, escalated: 0, allow_pct: 0, deny_pct: 0, escalate_pct: 0, top_rules: [], timeline: [] };

      return (
        <div className="min-h-screen">
          {/* Header */}
          <header className="sticky top-0 z-50 glass border-b border-slate-700/50">
            <div className="max-w-[1600px] mx-auto px-6 py-3 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="text-cyan-400">
                  <ShieldIcon className="w-8 h-8" />
                </div>
                <div>
                  <h1 className="text-lg font-bold text-white tracking-tight">AgentShield</h1>
                  <p className="text-[10px] text-slate-500 uppercase tracking-widest">Runtime Firewall Dashboard</p>
                </div>
              </div>
              <div className="flex items-center gap-4">
                <div className="flex items-center gap-2 text-xs">
                  <span className={`w-2 h-2 rounded-full ${connected ? "bg-emerald-400 pulse-dot" : "bg-red-400"}`}></span>
                  <span className={connected ? "text-emerald-400" : "text-red-400"}>
                    {connected ? "Connected" : "Reconnecting..."}
                  </span>
                </div>
                <a
                  href="/api/export?format=csv"
                  className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-slate-800 border border-slate-700 text-xs text-slate-300 hover:text-cyan-400 hover:border-cyan-500/30 transition-colors"
                >
                  <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" />
                  </svg>
                  Export CSV
                </a>
              </div>
            </div>
          </header>

          {/* Main Content */}
          <main className="max-w-[1600px] mx-auto px-6 py-6 space-y-6">
            {/* Stats Row */}
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
              <StatCard label="Total Events" value={s.total} color="cyan"   icon="&#x1f4ca;" />
              <StatCard label="Allowed"      value={s.allowed}   pct={s.allow_pct}    color="green" icon="&#x2705;" />
              <StatCard label="Blocked"      value={s.denied}    pct={s.deny_pct}     color="red"   icon="&#x1f6d1;" />
              <StatCard label="Escalated"    value={s.escalated} pct={s.escalate_pct} color="amber" icon="&#x26a0;" />
            </div>

            {/* Tab Navigation */}
            <div className="flex items-center gap-1 p-1 bg-slate-800/50 rounded-lg w-fit border border-slate-700/30">
              {[
                { key: "feed",  label: "Live Feed" },
                { key: "rules", label: "Rules" },
                { key: "analytics", label: "Analytics" },
              ].map(t => (
                <button
                  key={t.key}
                  onClick={() => setTab(t.key)}
                  className={`px-4 py-1.5 rounded-md text-xs font-medium transition-all ${
                    tab === t.key
                      ? "bg-cyan-500/20 text-cyan-400 border border-cyan-500/30"
                      : "text-slate-400 hover:text-slate-200 border border-transparent"
                  }`}
                >
                  {t.label}
                </button>
              ))}
            </div>

            {/* Tab Content */}
            {tab === "feed" && (
              <div className="space-y-4 fade-in">
                <FilterBar filter={filter} setFilter={setFilter} />
                <EventFeed events={events} filter={filter} />
              </div>
            )}

            {tab === "rules" && (
              <div className="fade-in">
                <RulesTable rules={rules} />
              </div>
            )}

            {tab === "analytics" && (
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 fade-in">
                <TimelineChart data={s.timeline} />
                <TopRulesChart topRules={s.top_rules} />
              </div>
            )}
          </main>

          {/* Footer */}
          <footer className="border-t border-slate-800/50 mt-12">
            <div className="max-w-[1600px] mx-auto px-6 py-4 flex items-center justify-between text-xs text-slate-600">
              <span>AgentShield v0.1.0</span>
              <span>The runtime firewall for AI agents</span>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
